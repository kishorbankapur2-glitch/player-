<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23000000'/%3E%3Cpolygon points='30,30 70,50 30,70' fill='%23ffffff'/%3E%3C/svg%3E">
    <title>Careless Video Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }

        #app-root {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            transition: none;
        }

        body.force-landscape #app-root {
            width: 100vh;
            height: 100vw;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(90deg);
        }

        .player-card {
            width: 92%;
            max-width: 880px;
            margin: 0 auto;
            background: rgba(20, 25, 40, 0.6);
            backdrop-filter: blur(22px);
            border-radius: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 18px 20px 20px 20px;
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        @media (max-width: 560px) {
            .player-card {
                padding: 12px 14px 16px 14px;
                width: 94%;
            }
        }

        .player-title {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 12px;
            margin-left: 6px;
            letter-spacing: 0.8px;
            opacity: 0.95;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        .video-wrapper:fullscreen,
        .video-wrapper:-webkit-full-screen {
            width: 100vw;
            height: 100vh;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .video-wrapper:fullscreen video,
        .video-wrapper:-webkit-full-screen video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 0;
        }

        video {
            width: 100%;
            display: block;
            background: #000;
            object-fit: contain;
            aspect-ratio: 16 / 9;
            border-radius: 20px;
            transition: border-radius 0.2s;
        }

        .controls-panel {
            margin-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar {
            width: 100%;
            height: 5px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.25);
            border-radius: 30px;
            cursor: pointer;
        }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255,255,255,0.9);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .time-display {
            font-size: 13px;
            font-weight: 500;
            color: #f0f0f0;
            letter-spacing: 0.3px;
            opacity: 0.9;
            font-family: monospace;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            width: fit-content;
        }

        .button-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        button, .file-label {
            flex: 1 0 auto;
            min-width: 68px;
            height: 48px;
            background: rgba(15, 20, 30, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            font-weight: 600;
            font-size: 0.8rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            font-family: 'Inter', sans-serif;
            gap: 4px;
        }

        button:active, .file-label:active {
            background: rgba(55, 75, 120, 0.95);
            transform: scale(0.96);
        }

        .file-label {
            position: relative;
            overflow: hidden;
        }
        .file-label input {
            position: absolute;
            opacity: 0;
            inset: 0;
            cursor: pointer;
            font-size: 0;
        }

        .fs-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 30;
        }
        .video-wrapper:fullscreen .fs-overlay.show,
        .video-wrapper:-webkit-full-screen .fs-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .fs-overlay::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(0,0,0,0.3), transparent);
            pointer-events: none;
        }

        .fs-controls-group {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: auto;
            min-width: 88px;
            background: rgba(10, 12, 18, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 16px 12px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .fs-controls-group button, 
        .fs-controls-group .file-label {
            width: 100%;
            height: 46px;
            background: rgba(25, 30, 48, 0.95);
            border-radius: 40px;
            font-size: 0.7rem;
            min-width: unset;
            flex: none;
            margin: 0;
        }

        .progress-fs {
            position: absolute;
            bottom: 70px;
            left: 20px;
            right: 130px;
            width: auto !important;
            height: 5px;
        }
        .time-fs {
            position: absolute;
            bottom: 24px;
            left: 20px;
            color: white;
            font-size: 0.85rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(10px);
            padding: 6px 14px;
            border-radius: 40px;
            font-family: monospace;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .pip-hidden { display: none !important; }

        #debug-status {
            position: fixed;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.6);
            color: #aaffdd;
            font-size: 9px;
            padding: 4px 8px;
            border-radius: 20px;
            font-family: monospace;
            z-index: 9999;
            pointer-events: none;
            backdrop-filter: blur(4px);
            letter-spacing: 0.4px;
        }

        body {
            overflow: hidden;
            position: fixed;
        }
    </style>
</head>
<body>

<div id="debug-status">stable ready</div>

<div id="app-root">
    <div class="player-card">
        <div class="player-title">CARELESS PLAYER - STABLE CENTER</div>
        <div class="video-wrapper" id="videoContainer">
            <video id="video" preload="metadata" playsinline webkit-playsinline></video>
            <div class="fs-overlay" id="fsOverlay">
                <input type="range" id="progressFS" class="progress-bar progress-fs" min="0" max="100" value="0">
                <div class="time-fs" id="timeFS">00:00 / 00:00</div>
                <div class="fs-controls-group">
                    <button id="fsBack">-10s</button>
                    <button id="fsPlay">Play</button>
                    <button id="fsForward">+10s</button>
                    <button id="fsSpeed">1x</button>
                    <button id="fsPip">PiP</button>
                    <button id="fsExit">Exit</button>
                    <label class="file-label">File<input type="file" id="fsFileInput" accept="video/*"></label>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <input type="range" id="progressMain" class="progress-bar" min="0" max="100" value="0">
            <div class="time-display" id="timeMain">00:00 / 00:00</div>
            <div class="button-grid">
                <button id="btnBack">-10s</button>
                <button id="btnPlay">Play</button>
                <button id="btnForward">+10s</button>
                <button id="btnSpeed">1x</button>
                <button id="btnPip">PiP</button>
                <button id="btnFullscreen">Full</button>
                <label class="file-label">File<input type="file" id="mainFileInput" accept="video/*"></label>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
    const appRoot = document.getElementById('app-root');
    const debugSpan = document.getElementById('debug-status');

    function isPortraitOrientation() {
        if (screen.orientation && screen.orientation.type) {
            const type = screen.orientation.type;
            if (type.includes('portrait')) return true;
            if (type.includes('landscape')) return false;
        }
        if (screen.width && screen.height) {
            return screen.height > screen.width;
        }
        return window.innerHeight > window.innerWidth;
    }

    function updateOrientationLock() {
        const isPortrait = isPortraitOrientation();
        document.body.classList.toggle('force-landscape', isPortrait);
        
        let orientType = 'N/A';
        if (screen.orientation && screen.orientation.type) orientType = screen.orientation.type;
        debugSpan.innerHTML = `${screen.width}x${screen.height} | ${orientType} | ${isPortrait ? 'portrait-rotated' : 'landscape'}`;
    }

    updateOrientationLock();

    const orientationChangeHandler = () => {
        setTimeout(updateOrientationLock, 20);
        setTimeout(updateOrientationLock, 80);
        setTimeout(updateOrientationLock, 200);
    };
    
    window.addEventListener('resize', orientationChangeHandler);
    window.addEventListener('orientationchange', orientationChangeHandler);
    if (screen.orientation) {
        screen.orientation.addEventListener('change', orientationChangeHandler);
    }
    
    async function requestLandscapeLock() {
        if (!screen.orientation || typeof screen.orientation.lock !== 'function') return;
        try {
            await screen.orientation.lock('landscape');
        } catch(e) {
            try {
                await screen.orientation.lock('landscape-primary');
            } catch(err) {}
        }
    }
    document.addEventListener('click', () => { requestLandscapeLock(); }, { once: true });
    document.addEventListener('touchstart', () => { requestLandscapeLock(); }, { once: true });
    
    const video = document.getElementById('video');
    const videoContainer = document.getElementById('videoContainer');
    const fsOverlay = document.getElementById('fsOverlay');
    
    const progressMain = document.getElementById('progressMain');
    const timeMain = document.getElementById('timeMain');
    const btnPlay = document.getElementById('btnPlay');
    const btnBack = document.getElementById('btnBack');
    const btnForward = document.getElementById('btnForward');
    const btnSpeed = document.getElementById('btnSpeed');
    const btnPip = document.getElementById('btnPip');
    const btnFullscreen = document.getElementById('btnFullscreen');
    const mainFileInput = document.getElementById('mainFileInput');
    
    const progressFS = document.getElementById('progressFS');
    const timeFS = document.getElementById('timeFS');
    const fsPlay = document.getElementById('fsPlay');
    const fsBack = document.getElementById('fsBack');
    const fsForward = document.getElementById('fsForward');
    const fsSpeed = document.getElementById('fsSpeed');
    const fsPip = document.getElementById('fsPip');
    const fsExit = document.getElementById('fsExit');
    const fsFileInput = document.getElementById('fsFileInput');
    
    let speedIndex = 0;
    const speeds = [1, 1.25, 1.5, 1.75, 2, 2.5, 3];
    
    let fullscreenActive = false;
    let hideTimeout = null;
    
    function formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds) || seconds < 0) return '00:00';
        const hrs = Math.floor(seconds / 3600);
        const mins = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        const pad = (n) => n < 10 ? '0' + n : n;
        if (hrs > 0) {
            return `${hrs}:${pad(mins)}:${pad(secs)}`;
        }
        return `${pad(mins)}:${pad(secs)}`;
    }
    
    function updateProgressAndTime() {
        if (!video.duration || isNaN(video.duration) || video.duration === Infinity) return;
        const percent = (video.currentTime / video.duration) * 100;
        progressMain.value = percent;
        if (progressFS) progressFS.value = percent;
        const timeStr = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        timeMain.textContent = timeStr;
        if (timeFS) timeFS.textContent = timeStr;
    }
    
    function setPlayPauseButtonState(isPlaying) {
        const playLabel = isPlaying ? 'Pause' : 'Play';
        btnPlay.textContent = playLabel;
        if (fsPlay) fsPlay.textContent = playLabel;
    }
    
    function togglePlayback() {
        if (video.paused) {
            video.play().catch(e => console.log("play error", e));
        } else {
            video.pause();
        }
    }
    
    function updateSpeedUI() {
        const spd = speeds[speedIndex];
        const label = spd.toFixed(2).replace(/\.?0+$/, '') + 'x';
        btnSpeed.textContent = label;
        if (fsSpeed) fsSpeed.textContent = label;
        video.playbackRate = spd;
    }
    
    function nextSpeed() {
        speedIndex = (speedIndex + 1) % speeds.length;
        updateSpeedUI();
    }
    
    function skipSeconds(delta) {
        if (!video.duration || isNaN(video.duration)) return;
        let newTime = video.currentTime + delta;
        newTime = Math.max(0, Math.min(newTime, video.duration));
        video.currentTime = newTime;
    }
    
    async function togglePiP() {
        if (!document.pictureInPictureEnabled) return;
        try {
            if (document.pictureInPictureElement === video) {
                await document.exitPictureInPicture();
            } else {
                await video.requestPictureInPicture();
            }
        } catch (err) {
            console.warn("PiP error", err);
        }
    }
    
    function loadVideoFile(file) {
        if (!file) return;
        if (video.src && video.src.startsWith('blob:')) {
            URL.revokeObjectURL(video.src);
        }
        const url = URL.createObjectURL(file);
        video.src = url;
        video.load();
        video.play().catch(e => console.log("auto play error", e));
        speedIndex = speeds.indexOf(1);
        if (speedIndex === -1) speedIndex = 0;
        updateSpeedUI();
    }
    
    async function enterFullscreen() {
        try {
            const requestMethod = videoContainer.requestFullscreen || videoContainer.webkitRequestFullscreen;
            if (requestMethod) {
                await requestMethod.call(videoContainer);
                fullscreenActive = true;
                setTimeout(() => requestLandscapeLock(), 150);
            }
        } catch (err) {
            console.error("Fullscreen error", err);
        }
    }
    
    async function exitFullscreen() {
        try {
            const exitMethod = document.exitFullscreen || document.webkitExitFullscreen;
            if (exitMethod && (document.fullscreenElement || document.webkitFullscreenElement)) {
                await exitMethod.call(document);
                fullscreenActive = false;
            } else {
                fullscreenActive = false;
            }
        } catch (err) {
            console.warn("exit fs error", err);
        }
    }
    
    function toggleFullscreen() {
        if (fullscreenActive || document.fullscreenElement || document.webkitFullscreenElement) {
            exitFullscreen();
        } else {
            enterFullscreen();
        }
    }
    
    function showOverlay() {
        if (!fullscreenActive && !(document.fullscreenElement || document.webkitFullscreenElement)) return;
        fsOverlay.classList.add('show');
        if (hideTimeout) clearTimeout(hideTimeout);
        if (!video.paused) {
            hideTimeout = setTimeout(() => {
                fsOverlay.classList.remove('show');
            }, 2800);
        }
    }
    
    function resetOverlayTimer() {
        if (!fullscreenActive && !(document.fullscreenElement || document.webkitFullscreenElement)) return;
        showOverlay();
    }
    
    function onFullscreenChange() {
        const fsElement = document.fullscreenElement || document.webkitFullscreenElement;
        fullscreenActive = !!fsElement;
        if (!fullscreenActive) {
            fsOverlay.classList.remove('show');
            if (hideTimeout) clearTimeout(hideTimeout);
        } else {
            setTimeout(() => { showOverlay(); }, 100);
        }
    }
    document.addEventListener('fullscreenchange', onFullscreenChange);
    document.addEventListener('webkitfullscreenchange', onFullscreenChange);
    
    videoContainer.addEventListener('dblclick', (e) => {
        e.preventDefault();
        toggleFullscreen();
    });
    
    videoContainer.addEventListener('mousemove', resetOverlayTimer);
    videoContainer.addEventListener('touchstart', resetOverlayTimer);
    video.addEventListener('click', (e) => {
        if (!fullscreenActive && !(document.fullscreenElement || document.webkitFullscreenElement)) {
            togglePlayback();
        }
    });
    
    video.addEventListener('loadedmetadata', updateProgressAndTime);
    video.addEventListener('timeupdate', updateProgressAndTime);
    video.addEventListener('canplay', updateProgressAndTime);
    video.addEventListener('play', () => setPlayPauseButtonState(true));
    video.addEventListener('pause', () => setPlayPauseButtonState(false));
    
    progressMain.addEventListener('input', (e) => {
        if (video.duration && isFinite(video.duration)) {
            video.currentTime = (e.target.value / 100) * video.duration;
        }
    });
    if (progressFS) {
        progressFS.addEventListener('input', (e) => {
            if (video.duration && isFinite(video.duration)) {
                video.currentTime = (e.target.value / 100) * video.duration;
            }
        });
    }
    
    btnPlay.addEventListener('click', togglePlayback);
    btnBack.addEventListener('click', () => skipSeconds(-10));
    btnForward.addEventListener('click', () => skipSeconds(10));
    btnSpeed.addEventListener('click', nextSpeed);
    btnPip.addEventListener('click', togglePiP);
    btnFullscreen.addEventListener('click', toggleFullscreen);
    
    if (fsPlay) fsPlay.addEventListener('click', togglePlayback);
    if (fsBack) fsBack.addEventListener('click', () => skipSeconds(-10));
    if (fsForward) fsForward.addEventListener('click', () => skipSeconds(10));
    if (fsSpeed) fsSpeed.addEventListener('click', nextSpeed);
    if (fsPip) fsPip.addEventListener('click', togglePiP);
    if (fsExit) fsExit.addEventListener('click', exitFullscreen);
    
    mainFileInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) loadVideoFile(e.target.files[0]);
        mainFileInput.value = '';
    });
    if (fsFileInput) {
        fsFileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) loadVideoFile(e.target.files[0]);
            fsFileInput.value = '';
        });
    }
    
    if (!document.pictureInPictureEnabled) {
        btnPip.style.display = 'none';
        if (fsPip) fsPip.style.display = 'none';
    }
    
    updateSpeedUI();
    
    video.addEventListener('loadeddata', () => {
        updateProgressAndTime();
    });
    
    window.addEventListener('load', () => {
        updateOrientationLock();
        setTimeout(updateOrientationLock, 100);
        setTimeout(updateOrientationLock, 300);
    });
    
    document.addEventListener('visibilitychange', () => {
        if (!document.hidden) updateOrientationLock();
    });
})();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    });
}
</script>
</body>
</html>
