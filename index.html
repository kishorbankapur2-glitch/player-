<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title>Careless Player · Smart Estimate</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600&display=swap');

:root {
  --ios-bg: #000000;
  --ios-card: rgba(28, 28, 30, 0.95);
  --ios-surface: rgba(44, 44, 46, 0.9);
  --ios-surface2: rgba(58, 58, 60, 0.85);
  --ios-border: rgba(255, 255, 255, 0.12);
  --ios-border-bright: rgba(255, 255, 255, 0.22);
  --ios-label: rgba(255, 255, 255, 0.95);
  --ios-label2: rgba(255, 255, 255, 0.55);
  --ios-blue: #0A84FF;
  --ios-fill: rgba(255, 255, 255, 0.08);
  --ios-fill2: rgba(255, 255, 255, 0.12);
  --ios-radius-sm: 10px;
  --ios-radius: 14px;
  --ios-radius-lg: 20px;
  --ios-radius-xl: 28px;
  --blur: blur(40px) saturate(180%);
  --font: 'Inter', -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--ios-bg);
  position: fixed; top: 0; left: 0;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}

#app-root {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  background: #000;
  display: flex; align-items: center; justify-content: center;
}

body.force-landscape #app-root {
  width: 100vh; height: 100vw;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) rotate(90deg);
}

/* PLAYER CARD */
.player-card {
  width: 94%;
  max-width: 900px;
  background: var(--ios-card);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-radius: var(--ios-radius-xl);
  border: 1px solid var(--ios-border-bright);
  overflow: hidden;
  box-shadow:
    0 0 0 0.5px rgba(255,255,255,0.06) inset,
    0 32px 64px -20px rgba(0,0,0,0.9),
    0 8px 24px -8px rgba(0,0,0,0.6);
}

/* TITLE BAR */
.title-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px 12px;
  border-bottom: 0.5px solid var(--ios-border);
}

.title-bar-left {
  display: flex; align-items: center; gap: 8px;
}

.app-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #1C1C1E, #3A3A3C);
  border-radius: 7px;
  border: 0.5px solid var(--ios-border-bright);
  display: flex; align-items: center; justify-content: center;
}

.app-icon svg { width: 14px; height: 14px; }

.app-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.6px;
  color: var(--ios-label2);
  text-transform: uppercase;
}

/* VIDEO AREA */
.video-wrapper {
  position: relative;
  width: 100%;
  background: #000;
  cursor: pointer;
}

.video-wrapper:fullscreen,
.video-wrapper:-webkit-full-screen {
  width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
  background: #000;
}

.video-wrapper:fullscreen video,
.video-wrapper:-webkit-full-screen video {
  width: 100%; height: 100%;
  object-fit: contain;
}

video {
  width: 100%;
  display: block;
  background: #000;
  object-fit: contain;
  aspect-ratio: 16/9;
}

/* GLASS CLOCK PILLS */
.time-panel {
  position: absolute;
  z-index: 40;
  background: rgba(28, 28, 30, 0.75);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-radius: 100px;
  padding: 5px 13px;
  border: 0.5px solid rgba(255,255,255,0.18);
  font-family: var(--font);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: -0.1px;
  color: var(--ios-label);
  white-space: nowrap;
  pointer-events: none;
  transition: opacity 0.2s;
}

.real-clock { top: 12px; left: 12px; }
.estimate-clock { top: 12px; right: 12px; }

@keyframes glowPulse {
  0% { border-color: rgba(255,255,255,0.18); }
  50% { border-color: rgba(10, 132, 255, 0.6); box-shadow: 0 0 8px rgba(10,132,255,0.3); }
  100% { border-color: rgba(255,255,255,0.18); }
}

.glow-update { animation: glowPulse 0.35s ease-out; }

/* CONTROLS SECTION */
.controls-section {
  padding: 14px 16px 16px;
  display: flex; flex-direction: column; gap: 12px;
}

/* PROGRESS TRACK */
.progress-container {
  display: flex; flex-direction: column; gap: 6px;
}

.progress-track-wrapper {
  position: relative;
  height: 4px;
  background: var(--ios-fill2);
  border-radius: 100px;
  cursor: pointer;
  overflow: visible;
}

.progress-fill {
  position: absolute;
  left: 0; top: 0;
  height: 100%;
  background: var(--ios-blue);
  border-radius: 100px;
  pointer-events: none;
  transition: width 0.05s linear;
}

.progress-bar {
  position: absolute;
  inset: -8px 0;
  width: 100%;
  height: calc(100% + 16px);
  opacity: 0;
  cursor: pointer;
  -webkit-appearance: none;
}

.progress-thumb {
  position: absolute;
  top: 50%;
  transform: translate(-50%, -50%);
  width: 16px; height: 16px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5), 0 0 0 0.5px rgba(255,255,255,0.1);
  pointer-events: none;
  transition: transform 0.15s ease;
}

.progress-track-wrapper:active .progress-thumb {
  transform: translate(-50%, -50%) scale(1.3);
}

.time-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.time-label {
  font-size: 12px;
  font-weight: 500;
  color: var(--ios-label2);
  letter-spacing: -0.1px;
  font-variant-numeric: tabular-nums;
}

/* BUTTON GRID */
.button-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 8px;
  align-items: center;
}

.ios-btn {
  height: 44px;
  background: var(--ios-surface);
  border: 0.5px solid var(--ios-border-bright);
  border-radius: var(--ios-radius-sm);
  color: var(--ios-label);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font);
  letter-spacing: -0.1px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: background 0.15s ease, transform 0.1s ease, opacity 0.15s;
  -webkit-appearance: none;
  outline: none;
  position: relative;
  overflow: hidden;
  text-decoration: none;
}

.ios-btn:active {
  background: var(--ios-surface2);
  transform: scale(0.94);
  opacity: 0.85;
}

.ios-btn .btn-icon {
  width: 18px; height: 18px;
  display: flex; align-items: center; justify-content: center;
  line-height: 1;
}

.ios-btn .btn-icon svg { display: block; }

.ios-btn .btn-label {
  font-size: 10px;
  font-weight: 500;
  color: var(--ios-label2);
  letter-spacing: 0.1px;
}

.ios-btn.btn-primary {
  background: var(--ios-blue);
  border-color: transparent;
}

.ios-btn.btn-primary:active {
  background: #007AEB;
}

.ios-btn.btn-primary .btn-label { color: rgba(255,255,255,0.7); }

/* Music button - pink/rose accent */
.ios-btn.btn-music {
  background: rgba(255, 45, 85, 0.18);
  border-color: rgba(255, 45, 85, 0.4);
}

.ios-btn.btn-music:active {
  background: rgba(255, 45, 85, 0.3);
}

.ios-btn.btn-music .btn-label {
  color: rgba(255, 45, 85, 0.85);
}

.ios-btn.btn-music .btn-icon svg {
  color: rgba(255, 45, 85, 0.9);
}

/* File label as button */
.file-label {
  height: 44px;
  background: var(--ios-surface);
  border: 0.5px solid var(--ios-border-bright);
  border-radius: var(--ios-radius-sm);
  color: var(--ios-label);
  font-size: 11px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  transition: background 0.15s, transform 0.1s;
  position: relative;
  overflow: hidden;
}

.file-label:active {
  background: var(--ios-surface2);
  transform: scale(0.94);
}

.file-label input {
  position: absolute;
  opacity: 0;
  inset: 0;
  cursor: pointer;
  font-size: 0;
}

.file-label .btn-icon { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; }
.file-label .btn-icon svg { display: block; }
.file-label .btn-label { font-size: 10px; font-weight: 500; color: var(--ios-label2); }

/* FULLSCREEN OVERLAY */
.fs-overlay {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: 30;
}

.video-wrapper:fullscreen .fs-overlay.show,
.video-wrapper:-webkit-full-screen .fs-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.fs-overlay::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(to bottom, rgba(0,0,0,0.0) 40%, rgba(0,0,0,0.6) 100%);
  pointer-events: none;
}

.progress-fs-container {
  position: absolute;
  bottom: 72px;
  left: 20px; right: 160px;
  display: flex; flex-direction: column; gap: 6px;
}

.progress-track-wrapper.fs-track {
  height: 3px;
  background: rgba(255,255,255,0.25);
}

.progress-track-wrapper.fs-track .progress-fill {
  background: #fff;
}

.time-fs {
  font-size: 12px;
  font-weight: 500;
  color: rgba(255,255,255,0.75);
  letter-spacing: -0.1px;
  font-variant-numeric: tabular-nums;
}

.fs-controls-group {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: rgba(28, 28, 30, 0.85);
  backdrop-filter: blur(30px) saturate(180%);
  -webkit-backdrop-filter: blur(30px) saturate(180%);
  border-radius: 22px;
  padding: 12px 8px;
  border: 0.5px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  min-width: 80px;
}

.fs-controls-group .ios-btn,
.fs-controls-group .file-label {
  height: 40px;
  border-radius: 12px;
  min-width: unset;
  flex: none;
}

@media (max-width: 480px) {
  .button-grid { gap: 6px; grid-template-columns: repeat(4, 1fr); }
  .ios-btn, .file-label { height: 40px; }
  .ios-btn .btn-icon, .file-label .btn-icon { width: 16px; height: 16px; }
  .title-bar { padding: 12px 14px 10px; }
  .controls-section { padding: 12px 12px 14px; gap: 10px; }
  .time-panel { font-size: 10px; padding: 4px 10px; }
}

@media (max-width: 360px) {
  .button-grid { grid-template-columns: repeat(4, 1fr); }
}
</style>
</head>
<body>
<div id="app-root">
  <div class="player-card">
    
    <div class="title-bar">
      <div class="title-bar-left">

            <polygon points="6,4 20,12 6,20" fill="rgba(255,255,255,0.75)"/>

            <span class="btn-label">File</span>
            <input type="file" id="fsFileInput" accept="video/*">

    </div>

    <div class="controls-section">
      <div class="progress-container">
        <div class="progress-track-wrapper" id="mainProgressWrapper">
          <div class="progress-fill" id="mainFill" style="width:0%"></div>
          <div class="progress-thumb" id="mainThumb" style="left:0%"></div>
          <input type="range" id="progressMain" class="progress-bar" min="0" max="100" value="0">

          <span class="time-label" id="timeDurationMain">0:00</span>

      </div>

      <div class="button-grid">
        <button class="ios-btn" id="btnBack">
          <span class="btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="19,20 9,12 19,4"/><line x1="5" y1="4" x2="5" y2="20"/></svg></span>
          <span class="btn-label">−10s</span>

        <button class="ios-btn btn-primary" id="btnPlay">
          <span class="btn-icon" id="mainPlayIcon"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg></span>
          <span class="btn-label" id="mainPlayLabel">Play</span>

        <button class="ios-btn" id="btnForward">
          <span class="btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5,4 15,12 5,20"/><line x1="19" y1="4" x2="19" y2="20"/></svg></span>

        <button class="ios-btn" id="btnPip">

<script>
(function() {
  // ORIENTATION LOCK (preserved from original)
  const appRoot = document.getElementById('app-root');
  function isPortrait() {
    if (screen.orientation?.type) return screen.orientation.type.includes('portrait');
    return window.innerHeight > window.innerWidth;
  }
  function updateOrientation() {
    document.body.classList.toggle('force-landscape', isPortrait());
  }
  updateOrientation();
  const onOrientationChange = () => {
    [20, 80, 200].forEach(d => setTimeout(updateOrientation, d));
  };
  window.addEventListener('resize', onOrientationChange);
  window.addEventListener('orientationchange', onOrientationChange);
  screen.orientation?.addEventListener('change', onOrientationChange);
  async function requestLandscape() {
    if (!screen.orientation?.lock) return;
    try { await screen.orientation.lock('landscape'); }
    catch(e) { try { await screen.orientation.lock('landscape-primary'); } catch(_) {} }
  }
  document.addEventListener('click', () => requestLandscape(), { once: true });
  document.addEventListener('touchstart', () => requestLandscape(), { once: true });

  // DOM refs
  const video = document.getElementById('video');
  const videoContainer = document.getElementById('videoContainer');
  const fsOverlay = document.getElementById('fsOverlay');
  const progressMain = document.getElementById('progressMain');
  const mainFill = document.getElementById('mainFill');
  const mainThumb = document.getElementById('mainThumb');
  const timeCurrentMain = document.getElementById('timeCurrentMain');
  const timeDurationMain = document.getElementById('timeDurationMain');
  const btnPlay = document.getElementById('btnPlay');
  const mainPlayIcon = document.getElementById('mainPlayIcon');
  const mainPlayLabel = document.getElementById('mainPlayLabel');
  const btnBack = document.getElementById('btnBack');
  const btnForward = document.getElementById('btnForward');
  const btnSpeed = document.getElementById('btnSpeed');
  const mainSpeedLabel = document.getElementById('mainSpeedLabel');
  const btnPip = document.getElementById('btnPip');
  const btnFullscreen = document.getElementById('btnFullscreen');
  const mainFileInput = document.getElementById('mainFileInput');
  const progressFS = document.getElementById('progressFS');
  const fsFill = document.getElementById('fsFill');
  const fsThumb = document.getElementById('fsThumb');
  const timeFS = document.getElementById('timeFS');
  const fsPlay = document.getElementById('fsPlay');
  const fsPlayIcon = document.getElementById('fsPlayIcon');
  const fsPlayLabel = document.getElementById('fsPlayLabel');
  const fsBack = document.getElementById('fsBack');
  const fsForward = document.getElementById('fsForward');
  const fsSpeed = document.getElementById('fsSpeed');
  const fsSpeedLabel = document.getElementById('fsSpeedLabel');
  const fsPip = document.getElementById('fsPip');
  const fsExit = document.getElementById('fsExit');
  const fsFileInput = document.getElementById('fsFileInput');
  const realClockEl = document.getElementById('realTimeClock');
  const estimateClockEl = document.getElementById('estimateClock');

  let speedIndex = 0;
  const speeds = [1, 1.25, 1.5, 1.75, 2, 2.5, 3];
  let fullscreenActive = false;
  let hideTimeout = null;

  // Utilities
  function pad(n) { return n < 10 ? '0' + n : String(n); }
  function formatTime(s) {
    if (isNaN(s) || !isFinite(s) || s < 0) return '0:00';
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
    return h > 0 ? `${h}:${pad(m)}:${pad(sec)}` : `${m}:${pad(sec)}`;
  }
  function formatRemaining(s) {
    if (isNaN(s) || !isFinite(s) || s <= 0) return '0m';
    const mins = Math.ceil(s/60);
    if (mins < 60) return `${mins}m`;
    const h = Math.floor(mins/60), m = mins%60;
    return m === 0 ? `${h}h` : `${h}h ${m}m`;
  }
  function formatFinish(d) {
    if (!d) return '--:-- --';
    const h = d.getHours(), min = d.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h%12 || 12;
    return `${h12}:${pad(min)} ${ampm}`;
  }
  function setPercent(pct) {
    const val = Math.min(100, Math.max(0, pct));
    mainFill.style.width = val + '%';
    mainThumb.style.left = val + '%';
    fsFill.style.width = val + '%';
    fsThumb.style.left = val + '%';
    progressMain.value = val;
    if (progressFS) progressFS.value = val;
  }
  function glow(el) {
    el.classList.remove('glow-update');
    void el.offsetWidth;
    el.classList.add('glow-update');
    setTimeout(() => el.classList.remove('glow-update'), 350);
  }

  // Real time clock
  function updateRealClock() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h%12 || 12;
    const str = `${h12}:${pad(m)} ${ampm}`;
    if (realClockEl.textContent !== str) {
      realClockEl.textContent = str;
      glow(realClockEl);
    }
  }
  function computeFinishDate() {
    if (!video.duration || !isFinite(video.duration) || video.duration === Infinity) return null;
    const remaining = (video.duration - video.currentTime) / video.playbackRate;
    if (!isFinite(remaining) || remaining < 0) return null;
    return new Date(Date.now() + remaining * 1000);
  }
  function updateEstimateClock() {
    const dur = video.duration;
    if (!dur || !isFinite(dur) || dur === Infinity) {
      estimateClockEl.textContent = '--m • --:-- --'; glow(estimateClockEl); return;
    }
    if (video.ended || video.currentTime >= dur - 0.05) {
      estimateClockEl.textContent = '0m • --:-- --'; glow(estimateClockEl); return;
    }
    const remSec = (dur - video.currentTime) / video.playbackRate;
    const finishDate = computeFinishDate();
    const txt = `${formatRemaining(remSec)} • ${formatFinish(finishDate)}`;
    if (estimateClockEl.textContent !== txt) {
      estimateClockEl.textContent = txt;
      glow(estimateClockEl);
    }
  }
  function refreshClocks() { updateRealClock(); updateEstimateClock(); }

  // Video progress
  function updateProgress() {
    if (!video.duration || !isFinite(video.duration) || video.duration === Infinity) return;
    const pct = (video.currentTime / video.duration) * 100;
    setPercent(pct);
    timeCurrentMain.textContent = formatTime(video.currentTime);
    timeDurationMain.textContent = formatTime(video.duration);
    const timeStr = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
    if (timeFS) timeFS.textContent = timeStr;
    updateEstimateClock();
  }

  const SVG_PLAY = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>`;
  const SVG_PAUSE = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>`;
  function setPlayState(playing) {
    mainPlayIcon.innerHTML = playing ? SVG_PAUSE : SVG_PLAY;
    mainPlayLabel.textContent = playing ? 'Pause' : 'Play';
    if (fsPlayIcon) fsPlayIcon.innerHTML = playing ? SVG_PAUSE : SVG_PLAY;
    if (fsPlayLabel) fsPlayLabel.textContent = playing ? 'Pause' : 'Play';
  }
  function togglePlay() {
    if (video.paused) video.play().catch(e => console.log('play err', e));
    else video.pause();
  }
  function skip(delta) {
    if (!video.duration || isNaN(video.duration)) return;
    video.currentTime = Math.max(0, Math.min(video.currentTime + delta, video.duration));
    updateProgress();
  }
  function updateSpeedUI() {
    const s = speeds[speedIndex];
    const lbl = (Number.isInteger(s) ? s : s.toFixed(2).replace(/\.?0+$/,'')) + '×';
    mainSpeedLabel.textContent = lbl;
    if (fsSpeedLabel) fsSpeedLabel.textContent = lbl;
    video.playbackRate = s;
    refreshClocks();
  }
  function nextSpeed() {
    speedIndex = (speedIndex + 1) % speeds.length;
    updateSpeedUI();
  }
  async function togglePiP() {
    if (!document.pictureInPictureEnabled) return;
    try {
      if (document.pictureInPictureElement === video) await document.exitPictureInPicture();
      else await video.requestPictureInPicture();
    } catch(e) { console.warn('PiP', e); }
  }
  function loadFile(file) {
    if (!file) return;
    if (video.src?.startsWith('blob:')) URL.revokeObjectURL(video.src);
    video.src = URL.createObjectURL(file);
    video.load();
    video.play().catch(() => {});
    speedIndex = speeds.indexOf(1); if (speedIndex < 0) speedIndex = 0;
    updateSpeedUI();
    video.addEventListener('loadedmetadata', () => { updateProgress(); refreshClocks(); }, { once: true });
    refreshClocks();
  }

  // Fullscreen
  async function enterFS() {
    try {
      const m = videoContainer.requestFullscreen || videoContainer.webkitRequestFullscreen;
      if (m) { await m.call(videoContainer); fullscreenActive = true; setTimeout(requestLandscape, 150); }
    } catch(e) {}
  }
  async function exitFS() {
    try {
      const m = document.exitFullscreen || document.webkitExitFullscreen;
      if (m && (document.fullscreenElement || document.webkitFullscreenElement)) await m.call(document);
    } catch(e) {}
    fullscreenActive = false;
  }
  function toggleFS() {
    if (fullscreenActive || document.fullscreenElement || document.webkitFullscreenElement) exitFS();
    else enterFS();
  }
  function showOverlay() {
    if (!fullscreenActive && !(document.fullscreenElement || document.webkitFullscreenElement)) return;
    fsOverlay.classList.add('show');
    if (hideTimeout) clearTimeout(hideTimeout);
    if (!video.paused) hideTimeout = setTimeout(() => fsOverlay.classList.remove('show'), 2800);
  }
  function onFSChange() {
    fullscreenActive = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if (!fullscreenActive) {
      fsOverlay.classList.remove('show');
      if (hideTimeout) clearTimeout(hideTimeout);
    } else setTimeout(showOverlay, 100);
  }

  // Event binding
  document.addEventListener('fullscreenchange', onFSChange);
  document.addEventListener('webkitfullscreenchange', onFSChange);
  videoContainer.addEventListener('dblclick', e => { e.preventDefault(); toggleFS(); });
  videoContainer.addEventListener('mousemove', showOverlay);
  videoContainer.addEventListener('touchstart', showOverlay);
  video.addEventListener('click', () => {
    if (!fullscreenActive && !document.fullscreenElement && !document.webkitFullscreenElement) togglePlay();
  });
  video.addEventListener('loadedmetadata', () => { updateProgress(); refreshClocks(); timeDurationMain.textContent = formatTime(video.duration); });
  video.addEventListener('timeupdate', updateProgress);
  video.addEventListener('canplay', updateProgress);
  video.addEventListener('play', () => { setPlayState(true); refreshClocks(); });
  video.addEventListener('pause', () => setPlayState(false));
  video.addEventListener('seeked', () => { updateProgress(); refreshClocks(); });
  video.addEventListener('ratechange', () => refreshClocks());
  video.addEventListener('ended', () => {
    estimateClockEl.textContent = '0m • --:-- --';
    glow(estimateClockEl);
    setPlayState(false);
    refreshClocks();
  });

  function handleProgressInput(val) {
    if (video.duration && isFinite(video.duration)) {
      video.currentTime = (val/100) * video.duration;
      updateProgress();
    }
  }
  progressMain.addEventListener('input', e => handleProgressInput(+e.target.value));
  if (progressFS) progressFS.addEventListener('input', e => handleProgressInput(+e.target.value));

  btnPlay.addEventListener('click', togglePlay);
  btnBack.addEventListener('click', () => skip(-10));
  btnForward.addEventListener('click', () => skip(10));
  btnSpeed.addEventListener('click', nextSpeed);
  btnPip.addEventListener('click', togglePiP);
  btnFullscreen.addEventListener('click', toggleFS);
  if (fsPlay) fsPlay.addEventListener('click', togglePlay);
  if (fsBack) fsBack.addEventListener('click', () => skip(-10));
  if (fsForward) fsForward.addEventListener('click', () => skip(10));
  if (fsSpeed) fsSpeed.addEventListener('click', nextSpeed);
  if (fsPip) fsPip.addEventListener('click', togglePiP);
  if (fsExit) fsExit.addEventListener('click', exitFS);
  mainFileInput.addEventListener('change', e => { if (e.target.files?.[0]) loadFile(e.target.files[0]); mainFileInput.value = ''; });
  if (fsFileInput) fsFileInput.addEventListener('change', e => { if (e.target.files?.[0]) loadFile(e.target.files[0]); fsFileInput.value = ''; });
  if (!document.pictureInPictureEnabled) {
    btnPip.style.display = 'none';
    if (fsPip) fsPip.style.display = 'none';
  }

  const clockInterval = setInterval(refreshClocks, 1000);
  window.addEventListener('beforeunload', () => clearInterval(clockInterval));
  document.addEventListener('visibilitychange', () => { if (!document.hidden) { updateOrientation(); refreshClocks(); } });
  window.addEventListener('load', () => { updateOrientation(); setTimeout(updateOrientation, 100); setTimeout(updateOrientation, 300); refreshClocks(); });
  updateSpeedUI();
  refreshClocks();
})();
</script>
</body>
</html>
